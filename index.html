<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle Financeiro</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

</head>

<body>

<div id="app">

<header>

<h1>💰 Controle Financeiro</h1>

<div class="saldo-card">
<h2>Saldo Atual</h2>
<h1 id="saldoAtual">R$ 0,00</h1>
</div>

</header>

<!-- MÊS -->

<section class="card">

<h2>Mês de Trabalho</h2>

<div class="linha">

<select id="mesSelecionado" onchange="trocarMes()">

<option value="01">Janeiro</option>
<option value="02">Fevereiro</option>
<option value="03">Março</option>
<option value="04">Abril</option>
<option value="05">Maio</option>
<option value="06">Junho</option>
<option value="07">Julho</option>
<option value="08">Agosto</option>
<option value="09">Setembro</option>
<option value="10">Outubro</option>
<option value="11">Novembro</option>
<option value="12">Dezembro</option>

</select>

<select id="anoSelecionado" onchange="trocarMes()">

<option>2025</option>
<option selected>2026</option>
<option>2027</option>
<option>2028</option>

</select>

</div>

</section>

<!-- RECEITAS -->

<section class="card">

<h2>Receitas</h2>

<div class="linha">

<input id="descricaoReceita" placeholder="Adicionar nova receita">

<input
id="valorReceita"
type="number"
step="0.01"
placeholder="Valor">

<button onclick="adicionarReceita()">
Adicionar
</button>

</div>

<ul id="listaReceitas"></ul>

</section>

<!-- VALE E PAGAMENTO -->

<section class="duas-colunas">

<div class="card">

<h2>Despesas no Vale</h2>

<div class="linha">

<input id="descricaoVale" placeholder="Adicionar nova despesa">

<input
id="valorVale"
type="number"
step="0.01"
placeholder="Valor">

<button onclick="adicionarVale()">
Adicionar
</button>

</div>

<ul id="listaVale"></ul>

</div>

<div class="card">

<h2>Despesas no Pagamento</h2>

<div class="linha">

<input
id="descricaoPagamento"
placeholder="Adicionar nova despesa">

<input
id="valorPagamento"
type="number"
step="0.01"
placeholder="Valor">

<button onclick="adicionarPagamento()">
Adicionar
</button>

</div>

<ul id="listaPagamento"></ul>

</div>

</section>

<!-- RESUMO -->

<section class="card resumo">

<h2>Resumo</h2>

<p>
<span>Receitas</span>
<span id="resReceitas">R$ 0,00</span>
</p>

<p>
<span>Vale</span>
<span id="resVale">R$ 0,00</span>
</p>

<p>
<span>Pagamentos</span>
<span id="resPagamento">R$ 0,00</span>
</p>

<p class="saldoFinal">
<span>Saldo</span>
<span id="saldoResumo">R$ 0,00</span>
</p>

</section>

<section class="card">

<button class="btnFecharMes"
onclick="fecharMes()">

📅 Fechar Mês

</button>

</section>

<!-- HISTÓRICO -->

<section class="card">

<h2>Histórico dos Meses</h2>

<ul id="historico"></ul>

</section>

<!-- FERRAMENTAS -->

<section class="card">

<h2>Ferramentas</h2>

<div class="botoes">

<button onclick="exportarBackup()">
💾 Backup
</button>

<button onclick="importarBackup()">
📂 Restaurar
</button>

<button class="btnExcluirTudo"
onclick="limparTudo()">
🗑️ Limpar Tudo
</button>
  
</div>

</section>

</div>

<input
type="file"
id="arquivoBackup"
style="display:none">

<script src="script.js"></script>

<script>

if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("sw.js");

}

</script>

</body>

</html>
